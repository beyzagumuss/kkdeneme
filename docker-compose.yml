services:
    postgres:
      image: postgres:15-alpine
      pull_policy: never
      container_name: deneme-postgres
      restart: unless-stopped
      environment:
        POSTGRES_USER: beyzauser
        POSTGRES_PASSWORD: new123
        POSTGRES_DB: hello_db
      ports:
        - "5433:5432"
      volumes:
        - deneme_postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U beyzauser -d hello_db"]
        interval: 5s
        retries: 5

    app:    
      build: .
      ports:
      - "3000-3002:3000"
      environment:
        DATABASE_URL: postgresql://beyzauser:new123@postgres:5432/hello_db
        PORT: 3000
      volumes:
        - .:/app
        - /app/node_modules
      depends_on:
        postgres:
          condition: service_healthy
        kafka1:
          condition: service_started
      command: npx nodemon -L server.js
    zookeeper1:
      image: confluentinc/cp-zookeeper:7.6.0
      container_name: deneme-zookeeper1
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000

    zookeeper2:
      image: confluentinc/cp-zookeeper:7.6.0
      container_name: deneme-zookeeper2
      environment:
        ZOOKEEPER_CLIENT_PORT: 2182
        ZOOKEEPER_TICK_TIME: 2000
    kafka-connect:
      image: confluentinc/cp-kafka-connect:7.6.0
      container_name: deneme-kafka-connect
      depends_on:
        - kafka1
        - zookeeper1
      ports:
        - "8083:8083"
      environment:
        CONNECT_BOOTSTRAP_SERVERS: kafka1:9092
        CONNECT_GROUP_ID: "connect-group"
        CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
        CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
        CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
        CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
        CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
        CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
        CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
        CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
        CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
        CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect

    kafka-connect-b:
      image: confluentinc/cp-kafka-connect:7.6.0
      container_name: deneme-kafka-connect-b
      depends_on:
        - kafka2
        - zookeeper2
      ports:
        - "8084:8083"
      environment:
        CONNECT_BOOTSTRAP_SERVERS: kafka2:9093
        CONNECT_GROUP_ID: "connect-group-b"
        CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs-b"
        CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets-b"
        CONNECT_STATUS_STORAGE_TOPIC: "connect-status-b"
        CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
        CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
        CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
        CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
        CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
        CONNECT_PLUGIN_PATH: "/usr/share/java,/usr/share/confluent-hub-components"
        CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect-b
    kafka-ui:
      image: ghcr.io/kafbat/kafka-ui:latest
      ports:
        - "8080:8080"
      environment:
         KAFKA_CLUSTERS_0_NAME: Cluster-A
         KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092
         KAFKA_CLUSTERS_1_NAME: Cluster-B
         KAFKA_CLUSTERS_1_BOOTSTRAPSERVERS: kafka2:9093
         KAFKA_CLUSTERS_1_DEFAULTKEYSERDE: String
         KAFKA_CLUSTERS_1_DEFAULTVALUESERDE: String
      depends_on:
       - kafka1
       - kafka2

    kafka1:
      image: confluentinc/cp-kafka:7.6.0
      container_name: deneme-kafka1
      depends_on:
        - zookeeper1
      ports:
       - "9092:9092"
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper1:2181
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka1:9092
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_NUM_PARTITIONS: 3
        KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      volumes:
        - kafka1_data:/var/lib/kafka/data

    kafka2:
      image: confluentinc/cp-kafka:7.6.0
      container_name: deneme-kafka2
      depends_on:
        - zookeeper2
      ports:
        - "9093:9092"
      environment:
        KAFKA_BROKER_ID: 2
        KAFKA_ZOOKEEPER_CONNECT: zookeeper2:2182
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka2:9093
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_NUM_PARTITIONS: 3
        KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      volumes:
        - kafka2_data:/var/lib/kafka/data


volumes:
  deneme_postgres_data:
  kafka1_data:
  kafka2_data:
  
